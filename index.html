<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隨機分組工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">RANDOM GROUP TOOL</p>
        <h1>快速產生隨機分組</h1>
        <p class="subtitle">
          輸入所有名單與分組條件後，系統會產生隨機分組。
        </p>
      </header>

      <section class="panel controls">
        <div class="field-group">
          <label for="namesInput">名單</label>
          <textarea
            id="namesInput"
            placeholder="請輸入名單，可一行一位或用逗號分隔。&#10;範例：&#10;王小明&#10;陳小華, 林小美"
          ></textarea>
        </div>

        <div class="two-col">
          <div class="field-group">
            <label for="groupCount">組數</label>
            <input id="groupCount" type="number" min="1" placeholder="例如：4" />
          </div>
          <div class="field-group">
            <label for="groupSize">每組人數</label>
            <input id="groupSize" type="number" min="1" placeholder="例如：5" />
          </div>
        </div>

        <div class="button-row">
          <button id="generateBtn" type="button" class="primary">產生分組</button>
          <button id="reshuffleBtn" type="button" class="secondary">重新分組</button>
          <button id="copyBtn" type="button" class="ghost">複製結果</button>
        </div>

        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel results-panel">
        <div class="results-title-row">
          <h2>分組結果</h2>
          <p id="meta" class="meta"></p>
        </div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="frontend.js"></script>
  </body>
</html>
